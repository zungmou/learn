<footer class="site-footer h-card">
  <data class="u-url" href="{{ "/" | relative_url }}"></data>

  <div class="wrapper">

    <div class="footer-col-wrapper">
      <div class="footer-col footer-col-1">
        <h2 class="footer-heading">站点概况</h2>
        <ul class="contact-list">
          <li><a href="{{ '/stats.html' | relative_url }}">查看详细统计信息</a></li>
        </ul>
      </div>

      <div class="footer-col footer-col-2">
        {%- include social.html -%}
      </div>

      <div class="footer-col footer-col-3">
        <p>{{ site.description | escape }}</p>
      </div>
    </div>

  </div>

</footer>

<script>
  /**
   * 自动转换 {wiki:主题} 为 维基百科链接
   */
  function renderWikiLinks(element) {
    if (!element) return;
    const regex = /\{wiki:(.+?)\}/g;
    element.innerHTML = element.innerHTML.replace(regex, (match, p1) => {
      const url = `https://zh.wikipedia.org/wiki/${encodeURIComponent(p1.trim())}`;
      return `<a href="${url}" target="_blank" class="wiki-link" title="在维基百科中查看 '${p1.trim()}'">${p1.trim()}</a>`;
    });
  }

  // 初始加载时运行
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.post-content, .note-content').forEach(el => {
      renderWikiLinks(el);
    });
  });
</script>
<script src="{{ '/assets/js/spa.js' | relative_url }}"></script>
